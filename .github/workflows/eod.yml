name: Nifty EOD update
on:
  schedule:
    - cron: '30 10 * * 1-5'   # 10:30 UTC = 16:00 IST, Mon-Fri (after NSE close)
  workflow_dispatch:           # lets you run it manually from the Actions tab
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch EOD data
        run: python fetch_nifty.py
      - name: Commit if changed
        run: |
          git config user.name  "nifty-bot"
          git config user.email "nifty-bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "EOD update $(date -u +%F)"
          git push
